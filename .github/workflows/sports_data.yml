name: Sports Data Auto Update

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape_and_commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Public Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cloudscraper beautifulsoup4 requests

      - name: Fetch Python Script from Private Repo
        env:
          REPO_NAME: ${{ secrets.SECRET_REPO_NAME }}
        run: |
          git clone https://${{ secrets.GH_PAT }}@github.com/sm-monirulislam/$REPO_NAME.git private_code
          mkdir -p App
          cp private_code/App/Sports_Data.py App/
          rm -rf private_code

      - name: Run Scraper Script
        run: python App/Sports_Data.py

      - name: Clean up Python Script
        run: rm -f App/Sports_Data.py

      - name: Commit and Push JSON File
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Sports_data.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "⚡ Sports Data Auto-updated"
            git push origin HEAD
          fi
